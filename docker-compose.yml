# Docker Compose stack for Zhambyl Hydraulic Structures Catalog
# 5 services: PostgreSQL/PostGIS/pgvector, Redis, MinIO, FastAPI, Celery worker
# All services have health checks; app services use depends_on with service_healthy.

services:
  postgres:
    build:
      context: ./docker/postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sujoly}
      POSTGRES_USER: ${POSTGRES_USER:-sujoly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sujoly_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Check both pg_isready AND postgis extension availability.
      # PostGIS init script restarts DB — pg_isready returns true prematurely (Pitfall #1).
      test:
        - "CMD-SHELL"
        - >-
          pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} &&
          psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c
          "SELECT extname FROM pg_extension WHERE extname='postgis';" | grep postgis
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      # Use mc ready local, NOT curl — curl removed from recent MinIO images (Pitfall #2).
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    environment:
      API_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sujoly}:${POSTGRES_PASSWORD:-sujoly_dev}@postgres:5432/${POSTGRES_DB:-sujoly}
      API_SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-sujoly}:${POSTGRES_PASSWORD:-sujoly_dev}@postgres:5432/${POSTGRES_DB:-sujoly}
      API_REDIS_URL: redis://redis:6379/0
      API_MINIO_ENDPOINT: minio:9000
      API_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      API_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      API_MINIO_USE_SSL: "false"
      API_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery-worker:
    build:
      context: ./apps/api
    command: celery -A api.celery_app worker --loglevel=info
    environment:
      API_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sujoly}:${POSTGRES_PASSWORD:-sujoly_dev}@postgres:5432/${POSTGRES_DB:-sujoly}
      API_SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-sujoly}:${POSTGRES_PASSWORD:-sujoly_dev}@postgres:5432/${POSTGRES_DB:-sujoly}
      API_REDIS_URL: redis://redis:6379/0
      API_MINIO_ENDPOINT: minio:9000
      API_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      API_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      API_MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
